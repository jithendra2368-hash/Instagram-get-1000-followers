<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Instagram</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #0095f6;
      --blue-hover: #1877f2;
      --border: #dbdbdb;
      --text-light: #8e8e8e;
      --text-dark: #262626;
      --bg: #fafafa;
      --white: #ffffff;
    }
    html, body { width: 100%; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 0;
      overflow-x: hidden;
    }
    .phone-shell {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 36px 32px;
      position: relative;
      overflow-y: auto;
    }
    .logo-wrap {
      margin-bottom: 36px;
      animation: fadeDown 0.5s ease both;
    }
    .logo-wrap img {
      width: 96px;
      height: 96px;
      object-fit: contain;
      display: block;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp 0.45s 0.1s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .input-field { position: relative; width: 100%; }
    .input-field input {
      width: 100%;
      padding: 15px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text-dark);
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }
    .input-field input::placeholder { color: var(--text-light); }
    .input-field input:focus { border-color: #a8a8a8; background: var(--white); }
    .input-field input.input-error { border-color: #ed4956; }
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
      cursor: pointer;
      padding: 4px;
      display: none;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--blue);
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s, opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      letter-spacing: 0.2px;
    }
    .btn-login:hover:not(:disabled) { background: var(--blue-hover); }
    .btn-login:active:not(:disabled) { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; cursor: default; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }
    .forgot {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
      text-decoration: none;
      display: block;
    }
    .forgot:hover { color: var(--text-light); }
    .divider {
      display: flex;
      align-items: center;
      gap: 18px;
      width: 100%;
      margin: 26px 0 20px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 1px;
    }
    .btn-facebook {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: none;
      border: none;
      color: var(--blue-hover);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px;
      transition: color 0.2s;
    }
    .btn-facebook:hover { color: var(--text-dark); }
    .btn-facebook svg { width: 18px; height: 18px; }
    .error-msg {
      font-size: 13px;
      color: #ed4956;
      text-align: center;
      margin-top: 2px;
      display: none;
    }
    .error-msg.visible { display: block; }
    .signup-bar {
      width: 100%;
      border-top: 1px solid var(--border);
      padding-top: 18px;
      margin-top: auto;
      text-align: center;
      font-size: 14px;
      color: var(--text-dark);
      animation: fadeUp 0.45s 0.2s ease both;
    }
    .signup-bar a { color: var(--blue); font-weight: 600; text-decoration: none; }
    .signup-bar a:hover { text-decoration: underline; }
    .app-download {
      margin-top: 28px;
      text-align: center;
      animation: fadeUp 0.45s 0.3s ease both;
      width: 100%;
    }
    .app-download p { font-size: 14px; color: var(--text-dark); margin-bottom: 14px; }
    .app-badges { display: flex; gap: 10px; justify-content: center; }
    .app-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      border: 1px solid #999;
      border-radius: 8px;
      padding: 7px 14px;
      text-decoration: none;
      color: var(--text-dark);
      transition: background 0.2s;
    }
    .app-badge:hover { background: #f0f0f0; }
    .badge-text { display: flex; flex-direction: column; line-height: 1.2; }
    .badge-sub { font-size: 10px; color: #333; }
    .badge-main { font-size: 13px; font-weight: 600; }
    .footer {
      margin-top: 32px;
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
      animation: fadeUp 0.45s 0.4s ease both;
      width: 100%;
    }
    .footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 5px 12px;
      margin-bottom: 12px;
    }
    .footer-links a { color: var(--text-light); text-decoration: none; font-size: 12px; }
    .footer-links a:hover { text-decoration: underline; }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #262626;
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (min-width: 500px) {
      body { background: #efefef; justify-content: center; padding: 40px 0; }
      .phone-shell {
        min-height: 812px;
        height: auto;
        border-radius: 40px;
        box-shadow: 0 20px 80px rgba(0,0,0,0.18);
        border: 8px solid #1a1a1a;
      }
    }
  </style>
</head>

  <script>
    //Password toggle
    const pwInput = document.getElementById('passwordInput');
    const togglePw = document.getElementById('togglePw');
    if (pwInput && togglePw) {
        pwInput.addEventListener('input',function() {
            togglePw.style.display = this.value ? 'block' : 'none';
        });
        togglePw.addEventListener('click',function() {
            const type = pwInput.getAttribute('type') === 'password' ? 'text' : 'password';
            pwInput.setAttribute('type', type);
            this.textContent = type === 'password' ? 'Show' : 'Hide';
        });
    }
    //Loading state on submit
    document.getElementById('loginForm').addEventListener('submit',function () {
        document.getElementById('loginBtn').classList.add('loading');
        document.getElementById('loginBtn').disabled = true;
    });
  </script>
